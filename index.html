<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>URL Metadata Previewer</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>URL Metadata Previewer</h1>
            <p>Paste a link to preview its metadata or drag & drop an image to extract its data</p>
        </header>

        <main>
            <section class="url-section">
                <div class="input-group">
                    <input type="text" id="urlInput" placeholder="https://example.com" autocomplete="off">
                    <button id="fetchBtn">Preview</button>
                </div>
                <div id="urlError" class="error hidden"></div>
            </section>
            <section class="drop-section" id="dropZone">
                <div class="drop-content">
                    <svg class="drop-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/>
                        <polyline points="17 8 12 3 7 8"/>
                        <line x1="12" y1="3" x2="12" y2="15"/>
                    </svg>
                    <p>Drag & drop an image here</p>
                    <span>or click to browse</span>
                    <input type="file" id="fileInput" accept="image/*" hidden>
                </div>
            </section>
            <section id="previewSection" class="preview-section hidden">
                <h2>Preview</h2>
                <div class="preview-card">
                    <div id="previewImage" class="preview-image"></div>
                    <div class="preview-content">
                        <h3 id="previewTitle">Title</h3>
                        <p id="previewDescription">Description</p>
                        <a id="previewUrl" href="#" target="_blank" rel="noopener"></a>
                    </div>
                </div>
            </section>
            <section id="imageMetaSection" class="meta-section hidden">
                <h2>Image Metadata</h2>
                <div class="meta-grid" id="metaGrid"></div>
            </section>
            <section id="rawSection" class="raw-section hidden">
                <h2>Raw Data</h2>
                <pre id="rawData"></pre>
            </section>
        </main>

        <footer>
            <p>Built by <a href="https://joeyk.xyz" target="_blank">Joeyk</a></p>
        </footer>
    </div>

    <script src="app.js"></script>
</body>
</html>
